<section>
  <form [formGroup]="transactionForm" (ngSubmit)="onFormSubmit()" class="transaction-form-grid">

    <!-- Expense / Income -->
    <div class="row type-toggle">
      <button
        type="button"
        [class.active]="transactionForm.get('type')?.value === 'expense'"
        (click)="transactionForm.get('type')?.setValue('expense')">
        Expense
      </button>
      <button
        type="button"
        [class.active]="transactionForm.get('type')?.value === 'income'"
        (click)="transactionForm.get('type')?.setValue('income')">
        Income
      </button>
    </div>

    <!--  Amount + Category -->
   <div class="amount-category">
  <div>
    <label for="amount">Amount:</label>
    <input type="text" id="amount" formControlName="amount" step="0.01" placeholder="0.00"  min="0.01" max="99999999.99" (input)="onAmountInput($event)">

    @if (amount?.hasError('required') && amount?.touched) {
  <div class="error">Amount is required</div>
}

@if (amount?.hasError('min') && amount?.touched) {
  <div class="error">Amount must be at least 0.01</div>
}

@if (amount?.hasError('max') && amount?.touched) {
  <div class="error">Amount cannot exceed 99,999,999.99</div>
}

  </div>

  <div>
    <label for="category">Category:</label>
    <select id="category" formControlName="category">
      <option value="" disabled selected>-- Choose category --</option>
      @for (cat of getCurrentCategories(); track cat) {
        <option [value]="cat">{{ cat }}</option>
      }
    </select>
  </div>
</div>

    <!--  Date -->
    <div class="row full-width ">
      <label  for="date">Date:</label>
      <input class="calendar"  type="date" id="date" formControlName="date">
    </div>

    <!-- Description -->
    <div class="row full-width">
      <label for="description">Description:</label>
      <input type="text" id="description" formControlName="description">
    </div>

    <!--  Submit -->
    <button type="submit" [disabled]="!transactionForm.valid">Add Transaction</button>

  </form>
</section>
