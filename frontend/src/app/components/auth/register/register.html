<div class="auth-container">
  <app-hero />
  <div class="auth-side">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Start tracking your expenses</p>

      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" placeholder="Your name"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••"/>
      </div>

      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }
<button class="btn-primary" (click)="onRegister()" [disabled]="isLoading">
  @if (isLoading) {
    <span class="btn-spinner"></span> Loading...
  } @else {
    Create Account
  }
</button>
      <p class="switch-auth">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
