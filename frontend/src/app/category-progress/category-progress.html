<section class="progress-section">

  <h2>Expense Categories by Percentage</h2>

  <div>
    @for (c of categoriesData; track c.category) {

      <div class="progress-item">

        <div class="progress-name">
          {{ c.category }}
        </div>

        <div class="category-progress">
          <div class="progress-bar">
            <div 
              class="progress-fill"
              [style.width.%]="c.percent"
            >
              <span class="percent">
                {{ c.percent }}%
              </span>
            </div>
          </div>

          <div class="total">
            ${{ c.total | number:'1.2-2' }}
          </div>
        </div>

      </div>

    }
  </div>

</section>
